name: Update Subscription Nodes

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade -q requests pyyaml urllib3 aiohttp

      - name: Run Crawler v24
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python crawler.py

      - name: Verify Output
        run: |
          echo "=== 检查输出文件 ==="
          ls -lh proxies.yaml subscription.txt 2>/dev/null || echo "部分文件未生成"
          echo ""
          echo "=== 节点统计 ==="
          grep -c "name:" proxies.yaml 2>/dev/null || echo "0"
          echo ""
          echo "=== Gist 链接 ==="
          echo "海外: https://gist.githubusercontent.com/litywang/dc87627768298a4f6af8281cad97dfa3/raw/proxies.yaml"
          echo "国内: https://gh-proxy.com/https://gist.githubusercontent.com/litywang/dc87627768298a4f6af8281cad97dfa3/raw/proxies.yaml"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxies.yaml subscription.txt stats.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Update proxies $(date '+%Y-%m-%d %H:%M')"
            git push --force-with-lease
          fi

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            *.log
            *.yaml
            *.txt
            *.json
          retention-days: 7
