name: Update Subscription Nodes - v28

on:
  push:
    branches: [main]
    paths:
      - 'crawler.py'
      - 'gen_cn_cidr.py'
      - 'sources.yaml'
      - 'cn_cidr_data.py'
      - '.github/workflows/update.yml'
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade -q httpx[http2] pyyaml python-dotenv urllib3 requests cachetools tqdm

      - name: 更新中国 CIDR 数据
        run: python gen_cn_cidr.py

      - name: Run Crawler v28.22
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          USE_ASYNC_FETCH: '1'

          # 🌏 亚洲策略：柔性配额，质量优先
          MAX_FINAL_NODES: 150
          TARGET_ASIA_RATIO: '0.45'
          ASIA_PRIORITY_BONUS: '35'
          ASIA_MIN_COUNT: '40'

          # ⚡ 四层验证阈值（针对国内网络特征优化）
          MAX_LATENCY: 4000
          MAX_PROXY_LATENCY: 5000
          MIN_PROXY_SPEED: '30'
          PROTO_HANDSHAKE_TIMEOUT: '10'
          SPEED_TEST_MIN_SUCCESS: '1'

          # 🌐 多URL验证
          SPEED_TEST_URLS: 'https://www.gstatic.com/generate_204,https://cp.cloudflare.com/generate_204,http://connectivitycheck.platform.hicloud.com/generate_204'

          # 🔄 重试与容错
          CLASH_TEST_RETRY: '2'

          # 📦 候选池与并发
          MAX_TCP_TEST_NODES: 1200
          MAX_PROXY_TEST_NODES: 1000
          MAX_FETCH_NODES: 5000
          MAX_FORK_REPOS: 60
          MAX_WORKERS: '80'
          FETCH_WORKERS: '150'
          TIMEOUT: '12'
        run: python crawler.py

      - name: Check Output
        run: |
          echo "=== 节点统计 ==="
          echo "proxies.yaml: $(wc -l < proxies.yaml) 行"
          echo "节点数: $(grep -c 'name:' proxies.yaml) 个"
          echo "区域: $(grep -oE '(HK|TW|JP|SG|KR|MY|TH|VN|ID|PH|MO|MN|KH|LA|US|OT)-[0-9]+' proxies.yaml | cut -d- -f1 | sort | uniq -c | sort -rn)"
          echo "亚洲占比: $(grep -oE '(HK|TW|JP|SG|KR|MY|TH|VN|ID|PH|MO|MN|KH|LA)-[0-9]+' proxies.yaml | wc -l) / $(grep -c 'name:' proxies.yaml)"

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # v28.39: 先彻底清理所有运行时缓存，确保工作区干净
          rm -f .ip_geo_cache.json
          git checkout -- .ip_geo_cache.json 2>/dev/null || true
          git rm --cached .ip_geo_cache.json 2>/dev/null || true
          
          # 确保 .gitignore 排除缓存文件（如果不存在则添加）
          if ! grep -q "\.ip_geo_cache\.json" .gitignore 2>/dev/null; then
            echo ".ip_geo_cache.json" >> .gitignore
            git add .gitignore
          fi
          
          # 只添加目标文件
          git add proxies.yaml subscription.txt cn_cidr_data.py
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "[OK] No changes to commit"
            exit 0
          fi
          
          git status
          git diff --staged --stat
          
          # v28.39: 安全推送策略
          # 先 fetch 远程最新状态
          git fetch origin main
          
          # 方法1: 尝试 rebase + autostash（最干净的方式）
          if git pull --rebase --autostash origin main; then
            echo "[OK] Rebase successful"
          else
            echo "[WARN] Rebase failed, trying merge strategy"
            git rebase --abort 2>/dev/null || true
            
            # 方法2: stash 本地变更，merge 后再应用
            git stash push -m "auto-stash-$(date +%s)"
            git pull origin main
            
            # 重新应用我们的变更（如果有冲突，优先保留我们的版本）
            git checkout --theirs proxies.yaml subscription.txt cn_cidr_data.py 2>/dev/null || true
            git add proxies.yaml subscription.txt cn_cidr_data.py
            git stash pop || true
          fi
          
          # 最终提交和推送
          git commit -m "Update proxies $(date '+%Y-%m-%d %H:%M') [v28.39]" || echo "[OK] Nothing new to commit"
          
          # 使用 token 推送
          git push https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git HEAD:main

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            *.log
            *.yaml
            *.txt
          retention-days: 7

      # v28.22: 失败通知机制
      - name: Notify Failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d "chat_id=$CHAT_ID" \
              -d "text=❌ ZRONG 更新失败: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d "parse_mode=HTML"
          fi
