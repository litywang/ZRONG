name: Update Subscription Nodes

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade -q requests pyyaml urllib3

      - name: Run Crawler v24
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python crawler.py

      - name: Check Output
        run: |
          echo "=== 节点统计 ==="
          echo "proxies.yaml: $(wc -l < proxies.yaml) 行"
          echo "节点数: $(grep -c 'name:' proxies.yaml) 个"
          echo "区域: $(grep -oE '(HK|TW|JP|SG|KR|MY|US)-[0-9]+' proxies.yaml | cut -d- -f1 | sort | uniq -c | sort -rn)"

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxies.yaml subscription.txt
          git status
          git diff --staged --stat
          git commit -m "Update proxies $(date '+%Y-%m-%d %H:%M')" || echo "Nothing to commit"
          git push https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git HEAD:main

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            *.log
            *.yaml
            *.txt
          retention-days: 7
