name: Update Proxies (With Unlock)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run crawler
        env:
          ENABLE_UNLOCK: "true"           # 开启流媒体解锁检测
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python crawler.py

      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add proxies.yaml subscription.txt
          git commit -m "Update proxies + unlock detection $(date)" || echo "No changes"
          git push
