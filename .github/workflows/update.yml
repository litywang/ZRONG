# .github/workflows/update.yml
name: Update Clash Nodes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v6  # ✅ 升级到 v6
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - run: pip install requests pyyaml
      
      - run: python crawler.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
      
      # ✅ 上传 Clash 日志（在清理之前）
      - name: Upload Clash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clash-logs-${{ github.run_number }}
          path: |
            clash_temp/clash.log
            clash_error_report.txt
          retention-days: 3
          if-no-files-found: warn
      
      # ✅ 清理临时文件（上传后）
      - name: Cleanup temp files
        if: always()
        run: rm -rf clash_temp
      
      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Update nodes $(date '+%Y-%m-%d %H:%M')"
          git push
