name: Update Subscription Nodes - v28

on:
  push:
    branches: [main]
    paths:
      - 'crawler.py'
      - 'gen_cn_cidr.py'
      - 'sources.yaml'
      - 'cn_cidr_data.py'
      - '.github/workflows/update.yml'
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade -q httpx[http2] pyyaml python-dotenv urllib3 requests cachetools tqdm

      - name: 更新中国 CIDR 数据
        run: python gen_cn_cidr.py

      - name: Run Crawler v28.5
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          USE_ASYNC_FETCH: '1'
          MAX_FINAL_NODES: 150
          MAX_LATENCY: 10000
          MAX_PROXY_LATENCY: 3000
          MAX_TCP_TEST_NODES: 1200
          MAX_PROXY_TEST_NODES: 600
          MAX_FETCH_NODES: 5000
          MAX_FORK_REPOS: 60
        run: python crawler.py

      - name: Check Output
        run: |
          echo "=== 节点统计 ==="
          echo "proxies.yaml: $(wc -l < proxies.yaml) 行"
          echo "节点数: $(grep -c 'name:' proxies.yaml) 个"
          echo "区域: $(grep -oE '(HK|TW|JP|SG|KR|MY|TH|VN|ID|US|OT)-[0-9]+' proxies.yaml | cut -d- -f1 | sort | uniq -c | sort -rn)"
          echo "亚洲占比: $(grep -oE '(HK|TW|JP|SG|KR|MY|TH|VN|ID)-[0-9]+' proxies.yaml | wc -l) / $(grep -c 'name:' proxies.yaml)"

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxies.yaml subscription.txt cn_cidr_data.py
          git status
          git diff --staged --stat
          git commit -m "Update proxies $(date '+%Y-%m-%d %H:%M') [v28]" || echo "Nothing to commit"
          git push https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git HEAD:main

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            *.log
            *.yaml
            *.txt
          retention-days: 7
