name: Update Subscription Nodes

on:
  schedule:
    - cron: '0 */3 * * *'  # 每 3 小时更新一次
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          pip install requests pyyaml urllib3
          sudo apt-get update && sudo apt-get install -y golang-go || true
          
      - name: Run Crawler
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ENABLE_UNLOCK: ${{ vars.ENABLE_UNLOCK || 'true' }}
          UNLOCK_PLATFORMS: ${{ vars.UNLOCK_PLATFORMS || '["Netflix","Disney+","ChatGPT","YouTube","Spotify"]' }}
        run: |
          echo "🚀 开始运行爬虫 v19.0..."
          python crawler.py
          echo "✅ 爬虫运行结束"
          
      - name: Verify Output Files
        run: |
          echo "=== 检查输出文件 ==="
          ls -lh proxies.yaml subscription.txt 2>/dev/null || echo "❌ 文件未生成"
          wc -l proxies.yaml subscription.txt 2>/dev/null || true
          
      - name: Commit and Push
        run: |
          echo "=== 提交文件 ==="
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git status
          git add proxies.yaml subscription.txt
          git diff-index --quiet HEAD || git commit -m "🔄 Auto update v19.0 $(date '+%Y-%m-%d %H:%M')"
          git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || echo "Nothing to push"
          echo "✅ 提交完成"
          
      - name: Verify Remote Files
        run: |
          echo "=== 验证远程文件 ==="
          curl -I "https://raw.githubusercontent.com/${{ github.repository }}/main/proxies.yaml" || echo "❌ YAML 不可访问"
          curl -I "https://raw.githubusercontent.com/${{ github.repository }}/main/subscription.txt" || echo "❌ TXT 不可访问"
          
      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            clash_temp/
            *.log
            *.yaml
            *.txt
          retention-days: 7
