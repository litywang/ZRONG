name: Update Subscription Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 明确设置超时时间
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: pip install requests pyyaml urllib3
        
      - name: Run Crawler
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          echo "🚀 开始运行爬虫..."
          python crawler.py
          echo "✅ 爬虫运行结束"
          ls -lh *.yaml *.txt 2>/dev/null || echo "⚠️ 未找到输出文件"
          
      - name: Commit Output Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || git commit -m "🔄 Auto update $(date '+%Y-%m-%d %H:%M')"
          git push || echo "Nothing to push"
          
      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            clash_temp/
            *.log
            *.yaml
            *.txt
          retention-days: 7
