name: Update Subscription Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: pip install requests pyyaml urllib3
        
      - name: Run Crawler
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: timeout 900 python crawler.py || echo "TIMEOUT_REACHED"
          
      - name: Commit Output Files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add proxies.yaml subscription.txt 2>/dev/null || true
          git commit -m "🔄 Auto update $(date '+%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
          
      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            clash_temp/
            *.log
          retention-days: 7
