# .github/workflows/update.yml
name: Update Clash Nodes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      
      # ✅ 添加系统信息调试
      - name: System Info
        run: |
          echo "=== 系统信息 ==="
          uname -a
          pwd
          ls -la
          free -h
          df -h
      
      - run: pip install requests pyyaml
      
      - run: python crawler.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
      
      # ✅ 显示 clash_temp 目录内容
      - name: Show clash_temp contents
        if: always()
        run: |
          echo "=== clash_temp 目录 ==="
          ls -la clash_temp/ 2>/dev/null || echo "目录不存在"
          echo "=== clash.log 内容 ==="
          cat clash_temp/clash.log 2>/dev/null || echo "日志不存在"
          echo "=== 错误报告 ==="
          cat clash_error_report.txt 2>/dev/null || echo "报告不存在"
      
      - name: Upload Clash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clash-logs-${{ github.run_number }}
          path: |
            clash_temp/
            clash_error_report.txt
          retention-days: 3
          if-no-files-found: warn
      
      - name: Cleanup temp files
        if: always()
        run: rm -rf clash_temp
      
      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "🔄 Update nodes $(date '+%Y-%m-%d %H:%M')"
          git push
