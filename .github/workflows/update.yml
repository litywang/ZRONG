name: Update Subscription Nodes - v30

on:
  push:
    branches: [main]
    paths:
      - 'crawler.py'

      - 'sources.yaml'
      - 'network/cn_cidr_data.py'
      - '.github/workflows/update.yml'
      - 'core/**'
      - 'network/**'
      - 'utils.py'
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: pip install --upgrade -q httpx[http2] pyyaml python-dotenv urllib3 requests cachetools tqdm geoip2 pydantic

      - name: Download GeoLite2 Database
        run: |
          # 直接下载未压缩的 .mmdb 文件（assets 不是 .gz 格式）
          rm -f GeoLite2-City.mmdb
          gh release download --repo P3TERX/GeoLite.mmdb --pattern "GeoLite2-City.mmdb" --dir . --clobber
          file GeoLite2-City.mmdb
          ls -lh GeoLite2-City.mmdb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # v29.1: 延迟收紧 + NET节点限制 + 亚洲保底提升
      - name: Run Crawler v30.0
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          USE_ASYNC_FETCH: '1'

          # 🌐 Actions 直连模式（无本地代理，禁用 dialer-proxy）
          USE_DIALER_PROXY: '0'

          # 🌏 v28.58: 大陆可达性测试加分（默认关闭MAINLAND_TEST时不生效）
          MAINLAND_PASS_BONUS: '20'

          # 🌏 亚洲策略：柔性配额，质量优先（v29调整）
          MAX_FINAL_NODES: 150
          TARGET_ASIA_RATIO: '0.50'
          ASIA_PRIORITY_BONUS: '35'
          ASIA_MIN_COUNT: '55'

          # ⚡ 四层验证阈值（v29.1进一步收紧）
          MAX_LATENCY: 2500
          MAX_PROXY_LATENCY: 3000
          MIN_PROXY_SPEED: '30'
          PROTO_HANDSHAKE_TIMEOUT: '10'
          SPEED_TEST_MIN_SUCCESS: '1'

          # 🌐 多URL验证
          SPEED_TEST_URLS: 'https://www.gstatic.com/generate_204,https://cp.cloudflare.com/generate_204,http://connectivitycheck.platform.hicloud.com/generate_204'

          # 🔄 重试与容错
          CLASH_TEST_RETRY: '2'

          # 📦 候选池与并发（v29扩大测试池，降低超时风险）
          MAX_TCP_TEST_NODES: 800
          MAX_PROXY_TEST_NODES: 500
          MAX_FETCH_NODES: 3000
          # 🏷 v30.0: CDN伪装节点数量上限（收紧到10个）
          MAX_WEB_NET_NODES: '10'

          MAX_FORK_REPOS: 40
          MAX_WORKERS: '40'
          FETCH_WORKERS: '80'
          TCP_WORKERS: '150'
          TIMEOUT: '8'
        run: python crawler.py

      - name: Check Output
        run: |
          echo "=== 节点统计 ==="
          echo "proxies.yaml: $(wc -l < proxies.yaml) 行"
          python3 << 'PYEOF'
          import yaml, re, sys
          sys.stdout.reconfigure(encoding='utf-8')
          with open('proxies.yaml', 'r', encoding='utf-8') as f:
              data = yaml.safe_load(f)
          proxies = data.get('proxies', [])
          total = len(proxies)
          print(f'Total: {total} nodes')
          # Asian flag emojis
          ASIA_FLAGS = {'🇭🇰':'HK','🇸🇬':'SG','🇯🇵':'JP','🇰🇷':'KR','🇹🇼':'TW',
                        '🇹🇭':'TH','🇻🇳':'VN','🇲🇾':'MY','🇮🇩':'ID','🇵🇭':'PH',
                        '🇲🇴':'MO','🇲🇳':'MN','🇰🇭':'KH','🇱🇦':'LA'}
          regions = {}
          web = 0
          for p in proxies:
              n = p.get('name', '')
              if n.startswith('[WEB]'):
                  web += 1
                  continue
              matched = False
              for flag, abbr in ASIA_FLAGS.items():
                  if flag in n:
                      regions[abbr] = regions.get(abbr, 0) + 1
                      matched = True
                      break
              if not matched:
                  m = re.search(r'[\U0001F1E6-\U0001F1FF]{2}', n)
                  if m: regions['OTHER'] = regions.get('OTHER', 0) + 1
                  else: regions['??'] = regions.get('??', 0) + 1
          asia = sum(v for k,v in regions.items() if k not in ('??','OTHER'))
          print(f'Asia: {asia} ({asia*100//max(total,1)}%)')
          print(f'[WEB]: {web} ({web*100//max(total,1)}%)')
          for k, v in sorted(regions.items(), key=lambda x: -x[1]):
              print(f'  {k}: {v}')
          protos = {}
          for p in proxies: protos[p.get('type','?')] = protos.get(p.get('type','?'), 0) + 1
          print('Protocols:', ', '.join(f'{k}:{v}' for k,v in sorted(protos.items(), key=lambda x:-x[1])))
          PYEOF

      # v28.98: 上传到 GitHub Gist（需在 Repo Secrets 配置 GIST_ID）
      # 使用 steps.gist.outputs.gist_url 条件更可靠
      - name: Upload to Gist
        id: gist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          if [ -z "$GIST_ID" ]; then
            echo "GIST_ID not configured, skipping"
            echo "gist_url=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi
          set -e
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M')
          PROXY_COUNT=$(grep -c 'name:' proxies.yaml)
          ASIA_COUNT=$(grep -oE '(HK|TW|JP|SG|KR|MY|TH|VN|ID|PH|MO|MN|KH|LA)-[0-9]+' proxies.yaml | wc -l)
          ASIA_PCT=$(awk "BEGIN {printf \"%.0f\", $ASIA_COUNT/$PROXY_COUNT*100}")
          DESC="ZRONG $TIMESTAMP | $PROXY_COUNT节点 | 亚洲$ASIA_COUNT($ASIA_PCT%)"
          echo "=== Gist 上传: $DESC ==="
          PROXIES_JSON=$(python3 -c "import json; print(json.dumps(open('proxies.yaml').read()))")
          SUB_JSON=$(python3 -c "import json; print(json.dumps(open('subscription.txt').read()))")
          RESPONSE=$(curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/gists/$GIST_ID" \
            -d "{\"description\": \"$DESC\", \"files\": {\"proxies.yaml\": {\"content\": $PROXIES_JSON}, \"subscription.txt\": {\"content\": $SUB_JSON}}}")
          GIST_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('html_url','ERROR'))" 2>/dev/null)
          echo "gist_url=$GIST_URL"
          echo "gist_url=$GIST_URL" >> $GITHUB_OUTPUT

      - name: Commit and Push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # v28.39: 先彻底清理所有运行时缓存，确保工作区干净
          rm -f .ip_geo_cache.json
          git checkout -- .ip_geo_cache.json 2>/dev/null || true
          git rm --cached .ip_geo_cache.json 2>/dev/null || true
          
          # 确保 .gitignore 排除缓存文件（如果不存在则添加）
          if ! grep -q "\.ip_geo_cache\.json" .gitignore 2>/dev/null; then
            echo ".ip_geo_cache.json" >> .gitignore
            git add .gitignore
          fi
          
          # 只添加目标文件（cn_cidr_data.py 已迁移到 network/，crawler 不修改它）
          git add proxies.yaml subscription.txt
          
          # 检查是否有变更需要提交
          if git diff --staged --quiet; then
            echo "[OK] No changes to commit"
            exit 0
          fi
          
          git status
          git diff --staged --stat
          
          # v28.39: 安全推送策略
          # 先 fetch 远程最新状态
          git fetch origin main
          
          # 方法1: 尝试 rebase + autostash（最干净的方式）
          if git pull --rebase --autostash origin main; then
            echo "[OK] Rebase successful"
          else
            echo "[WARN] Rebase failed, trying merge strategy"
            git rebase --abort 2>/dev/null || true
            
            # 方法2: stash 本地变更，merge 后再应用
            git stash push -m "auto-stash-$(date +%s)"
            git pull origin main
            
            # 重新应用我们的变更（如果有冲突，优先保留我们的版本）
            git checkout --theirs proxies.yaml subscription.txt 2>/dev/null || true
            git add proxies.yaml subscription.txt
            git stash pop || true
          fi
          
          # 最终提交和推送
          git commit -m "Update proxies $(date '+%Y-%m-%d %H:%M') [v30.0]" || echo "[OK] Nothing new to commit"
          
          # 使用 token 推送
          git push https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git HEAD:main

      - name: Upload Logs on Failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crash-logs-${{ github.run_id }}
          path: |
            *.log
            *.yaml
            *.txt
          retention-days: 7

      # v28.98: 成功通知（包含 Gist URL）
      - name: Notify Success
        if: success()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            NODE_COUNT=$(grep -c 'name:' proxies.yaml 2>/dev/null || echo "0")
            ASIA_COUNT=$(grep -oE '(HK|TW|JP|SG|KR|MY|TH|VN|ID|PH|MO|MN|KH|LA)-[0-9]+' proxies.yaml 2>/dev/null | wc -l || echo "0")
            MSG="✅ ZRONG v28.98 更新成功！$NODE_COUNT 节点 | 亚洲 $ASIA_COUNT"
            if [ -n "$GIST_ID" ]; then
              MSG="$MSG%0A📦 Gist: https://gist.github.com/$GIST_ID"
            fi
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d "chat_id=$CHAT_ID" \
              -d "text=$MSG" \
              -d "parse_mode=HTML"
          fi

      # v28.22: 失败通知机制
      - name: Notify Failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          if [ -n "$BOT_TOKEN" ] && [ -n "$CHAT_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
              -d "chat_id=$CHAT_ID" \
              -d "text=❌ ZRONG 更新失败: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              -d "parse_mode=HTML"
          fi
